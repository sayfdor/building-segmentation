experiment_name: "phase2_segformer_mitb3"
device: "cuda"

model:
  architecture: "Segformer"
  encoder_name: "mit_b3"
  encoder_weights: "imagenet"

dataset:
  name: "inria"
  image_dir: "data/inria/train/images"
  gt_dir: "data/inria/train/gt"
  patch_size: 512
  stride: 430
  val_size: 0.2

training:
  batch_size: 6
  epochs: 25
  lr: 0.0002
  weight_decay: 0.01
  mixed_precision: true